spring:
  application:
    name: deplifybot
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: false
      okhttp:
        enabled: true
      client:
        config:
          telegram:
            url: ${TELEGRAM_API_URL}${TELEGRAM_BOT_TOKEN}
            connect-timeout: 10000
            read-timeout: 15000
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 0s

telegram:
  bot:
    webhook:
      url: ${TELEGRAM_WEBHOOK_URL}
      path: /telegram/webhook

server:
  port: ${PORT}
